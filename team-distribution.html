<style>

  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #fff; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 16px; }
  .container { display: flex; gap: 32px; flex-wrap: wrap; }
  .main-grid { flex: 1; min-width: 700px; }

  .z-axis-bar { margin-bottom: 16px; }
  .z-axis-label { font-size: 10px; color: #555; margin-bottom: 6px; letter-spacing: 1px; }

  .project-tab {

  .project-tab:hover { border-color: #555; color: #aaa; }
  .project-tab.active { color: #fff; }

  .project-info.show { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .project-info .pi-name { font-weight: 700; font-size: 14px; }
  .project-info .pi-desc { color: #888; }
  .project-info .pi-stat { color: #aaa; font-size: 11px; }
  .project-info .pi-stat b { color: #fff; }

  .grid { display: grid; grid-template-columns: 64px repeat(12, 1fr); grid-template-rows: auto repeat(6, minmax(80px, auto)); gap: 2px; }
  .header-cell {
    font-size: 10px; font-weight: 600; color: #aaa; text-align: center;

  .header-cell .step-num { font-size: 14px; color: #fff; }
  .header-cell .step-name { font-size: 9px; color: #666; }
  .level-label {

    border-radius: 6px;
  }
  .level-label.l5 { background: #1a0a2e; color: #c084fc; }
  .level-label.l4 { background: #0a1a2e; color: #60a5fa; }
  .level-label.l3 { background: #0a2e1a; color: #4ade80; }
  .level-label.l2 { background: #2e2a0a; color: #facc15; }
  .level-label.l1 { background: #2e1a0a; color: #fb923c; }
  .level-label.l0 { background: #1a1a1a; color: #a0a0a0; }

    border-radius: 6px; padding: 4px; display: flex; flex-wrap: wrap; align-items: center;
    justify-content: center; gap: 3px; min-height: 48px; cursor: default; transition: all 0.2s;

  .cell:hover { transform: scale(1.05); z-index: 10; box-shadow: 0 0 12px rgba(255,255,255,0.15); }
  .cell.empty { background: #111118; }
  .cell.active { background: #16161e; border: 1px solid #333; }
  .cell.human { background: #2d1a3e; border: 1px solid #7c3aed55; }

  .badge {
    font-size: 9px; font-weight: 600; padding: 2px 5px; border-radius: 10px;
    white-space: nowrap; cursor: pointer; transition: all 0.15s; position: relative;
  }
  .badge:hover { transform: scale(1.15); z-index: 20; }
  .badge.human { background: #7c3aed; color: #fff; }
  .badge.agent { background: #2563eb; color: #fff; }
  .badge.agent.new { background: #059669; color: #fff; }
  .badge.agent.pending { background: #6b7280; color: #fff; }
  .badge.tool { background: #d97706; color: #fff; font-size: 9px; }
  .badge.tool.infra { background: #4b5563; color: #ddd; }
  .badge.tool.new { background: #15803d; color: #fff; border: 1px solid #22c55e; }
  .badge.inactive { opacity: 0.15 !important; filter: grayscale(1); pointer-events: none; }
  /* 三档虚实：done 12% / todo 35% / wip+blocked 100% */
  .badge.st-done-b { opacity: 0.12; }
  .badge.st-todo-b { opacity: 0.35; }
  /* wip 和 blocked 不加 class，默认 100% */
  .badge .sd { width: 5px; height: 5px; border-radius: 50%; display: inline-block; margin-left: 2px; vertical-align: middle; }
  .badge .sd.done { background: #4ade80; box-shadow: 0 0 3px #4ade80; }
  .badge .sd.wip { background: #facc15; box-shadow: 0 0 3px #facc15; }
  .badge .sd.blocked { background: #ef4444; box-shadow: 0 0 3px #ef4444; }
  .badge .dtag { font-size: 7px; margin-left: 2px; padding: 0 2px; border-radius: 3px; vertical-align: middle; opacity: 0.85; }
  .badge .dtag.mac { background: #60a5fa33; color: #60a5fa; }
  .badge .dtag.lg { background: #4ade8033; color: #4ade80; }
  .badge .dtag.hua { background: #facc1533; color: #facc15; }
  .badge .dtag.multi { background: #c084fc22; color: #c084fc; }
  .cell.st-done { background: #0d0d12 !important; border-color: #16161e !important; }
  .cell.st-wip { background: #1a1a10 !important; border-color: #facc1530 !important; }
  .cell.st-blocked { background: #1f1010 !important; border-color: #ef444430 !important; }
  .cell.st-mixed { background: #14161a !important; border-color: #60a5fa20 !important; }
  .progress-bar { height: 6px; border-radius: 3px; background: #222; margin-top: 4px; overflow: hidden; display: flex; }
  .progress-bar .pg-done { background: #4ade80; }
  .progress-bar .pg-wip { background: #facc15; }
  .progress-bar .pg-blocked { background: #ef4444; }

  .tooltip {
    display: none; position: fixed; background: #1e1e2e; border: 1px solid #444; border-radius: 8px;
    padding: 12px 16px; font-size: 12px; z-index: 100; max-width: 380px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);

  .tooltip.show { display: block; }
  .tooltip .tt-id { color: #888; font-size: 10px; }
  .tooltip .tt-project { font-size: 10px; padding: 1px 6px; border-radius: 4px; display: inline-block; margin-left: 6px; }
  .tooltip .tt-name { font-size: 14px; font-weight: 700; color: #fff; margin: 2px 0; }
  .tooltip .tt-role { color: #aaa; font-size: 11px; margin-bottom: 6px; }
  .tooltip .tt-detail { color: #ccc; font-size: 11px; line-height: 1.5; }

  .stats-card { background: #16161e; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .stats-card h3 { font-size: 13px; color: #888; margin-bottom: 10px; font-weight: 600; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
  .stat-label { font-size: 12px; color: #aaa; }
  .stat-value { font-size: 14px; font-weight: 700; }
  .stat-bar { height: 4px; border-radius: 2px; background: #222; margin-top: 2px; }
  .stat-bar-fill { height: 100%; border-radius: 2px; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #aaa; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  .subx-row { display: grid; grid-template-columns: 64px repeat(12, 1fr); gap: 2px; margin-top: 2px; }
  .subx-label { font-size: 9px; color: #555; text-align: center; display: flex; align-items: center; justify-content: center; }

  .subx-cell.active { background: #1a1a2e; }
  .subx-cell.idle { color: #333; }
  .flywheel-row { display: grid; grid-template-columns: 64px repeat(12, 1fr); gap: 2px; margin-top: 4px; }
  .flywheel-cell { font-size: 9px; color: #555; text-align: center; padding: 2px; }

  .account-layer { margin-top: 24px; padding: 16px; background: #12121a; border-radius: 10px; border: 1px solid #333; }
  .account-layer h2 { font-size: 15px; color: #fff; margin-bottom: 4px; }
  .account-layer .al-sub { font-size: 11px; color: #888; margin-bottom: 14px; }
  .account-cards { display: flex; gap: 16px; flex-wrap: wrap; }
  .account-card {
    flex: 1; min-width: 280px; background: #1a1a24; border-radius: 10px; padding: 16px;
    border: 1px solid #2a2a3a; transition: all 0.2s;
  }
  .account-card:hover { border-color: #555; }
  .ac-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .ac-id { font-size: 10px; color: #888; background: #222; padding: 2px 6px; border-radius: 4px; }
  .ac-name { font-size: 16px; font-weight: 700; color: #fff; }
  .ac-platform { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .ac-status { font-size: 11px; margin-top: 2px; }
  .ac-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
  .ac-metric { background: #111118; border-radius: 6px; padding: 8px; text-align: center; }
  .ac-metric .label { font-size: 9px; color: #666; }
  .ac-metric .value { font-size: 14px; font-weight: 700; margin-top: 2px; }
  .ac-metric .target { font-size: 9px; color: #555; margin-top: 1px; }
  .ac-serving { margin-top: 12px; font-size: 10px; color: #666; line-height: 1.6; }
  .ac-serving span { color: #aaa; }
  .model-label { font-size: 10px; color: #555; text-align: right; margin-top: 8px; letter-spacing: 0.5px; }

  /* Device allocation layer */
  .device-layer { margin-top: 24px; padding: 16px; background: #12121a; border-radius: 10px; border: 1px solid #333; }
  .device-layer h2 { font-size: 15px; color: #fff; margin-bottom: 4px; }
  .device-layer .dl-sub { font-size: 11px; color: #888; margin-bottom: 14px; }
  .device-cards { display: flex; gap: 12px; flex-wrap: wrap; }
  .device-card {
    flex: 1; min-width: 200px; background: #1a1a24; border-radius: 10px; padding: 14px;
    border: 1px solid #2a2a3a; transition: all 0.2s;

  .device-card:hover { border-color: #555; }
  .dc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .dc-name { font-size: 14px; font-weight: 700; color: #fff; }
  .dc-role { font-size: 10px; padding: 2px 6px; border-radius: 4px; }
  .dc-tasks { font-size: 11px; color: #aaa; line-height: 1.7; margin-top: 6px; }
  .dc-tasks .dt-emp { color: #60a5fa; font-weight: 600; }
  .dc-tasks .dt-tool { color: #d97706; font-weight: 600; }
  .dc-tasks .dt-dim { color: #555; }
  .dc-emplist { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 6px; }
  .dc-emplist .de { font-size: 9px; padding: 1px 5px; border-radius: 8px; background: #222; color: #aaa; }
  .dc-emplist .de.primary { background: #2563eb33; color: #60a5fa; border: 1px solid #2563eb55; }
  .dc-emplist .de.secondary { background: #f59e0b15; color: #d97706; border: 1px solid #d9770633; }
  .dc-emplist .de.na { background: #111; color: #444; }
</style>
</head>

function getStatus(empId, proj) {
  if (proj.id === 'all') return null;
  const st = projectStatus[proj.id];
  return st ? (st[empId] || 'todo') : null;
}

function getProjectProgress(proj) {
  if (proj.id === 'all') return null;
  const st = projectStatus[proj.id];
  if (!st) return null;
  const activeEmps = employees.filter(e => isEmpActive(e, proj));
  let done=0, wip=0, blocked=0, todo=0;
  activeEmps.forEach(e => {
    const s = st[e.id] || 'todo';
    if (s==='done') done++; else if (s==='wip') wip++; else if (s==='blocked') blocked++; else todo++;
  });
  const total = activeEmps.length;
  return { done, wip, blocked, todo, total, pct: Math.round((done/total)*100) };
}

// ═══════════════════════════════════════════════
// RENDERING ENGINE
// ═══════════════════════════════════════════════
let currentProject = projects[0];

function isEmpActive(emp, proj) {
  if (proj.id === 'all') return true;
  if (proj.active) return proj.active.has(emp.id);
  if (proj.inactive) return !proj.inactive.has(emp.id);
  return true;
}
function getEmpDetail(emp, proj) {
  if (proj.id === 'all') return emp.detail;
  return proj.details?.[emp.id] || emp.detail;
}
function getEmpPositions(emp, proj) {
  if (proj.id === 'all') return emp.positions;
  return proj.posOverrides?.[emp.id] || emp.positions;
}

// Resolve which device(s) an employee belongs to in a given project
function getEmpDevices(empId, proj) {
  if (proj.id === 'all') return [];
  const da = deviceAlloc[proj.id];
  if (!da) return [];
  const result = [];
  if (da.mac.primary.includes(empId)) result.push('mac');
  if (da.lg.primary.includes(empId)) result.push('lg');
  if (da.huawei.primary.includes(empId)) result.push('hua');
  return result;
}
function deviceTagHtml(empId, proj) {
  if (proj.id === 'all') return '';
  const devs = getEmpDevices(empId, proj);
  if (!devs.length) return '';
  const icons = { mac: '🖥', lg: '🏠', hua: '✈' };
  const labels = { mac: 'Mac', lg: 'LG', hua: '华为' };
  if (devs.length === 1) return `<span class="dtag ${devs[0]}">${icons[devs[0]]}</span>`;
  return devs.map(d => `<span class="dtag ${d}">${icons[d]}</span>`).join('');
}

function renderTabs() {
  const c = document.getElementById('project-tabs');
  c.innerHTML = '';
  projects.forEach(p => {
    const btn = document.createElement('button');
    btn.className = `project-tab${p.id === currentProject.id ? ' active' : ''}`;
    btn.style.cssText = p.id === currentProject.id ? `border-color:${p.color};color:${p.color};background:${p.color}15;` : '';
    btn.textContent = `${p.icon} ${p.name}`;
    btn.onclick = () => { currentProject = p; render(); };
    c.appendChild(btn);
  });
}
function renderProjectInfo() {
  const el = document.getElementById('project-info');
  if (currentProject.id === 'all') { el.classList.remove('show'); return; }
  const n = employees.filter(e => isEmpActive(e, currentProject)).length;
  const pg = getProjectProgress(currentProject);
  el.classList.add('show');
  el.style.borderColor = currentProject.color + '55';
  el.innerHTML = `
    <span class="pi-name" style="color:${currentProject.color}">${currentProject.icon} ${currentProject.name}</span>
    <span class="pi-desc">${currentProject.desc}</span>
    <span class="pi-stat">激活: <b>${n}</b>/36</span>
    ${currentProject.org ? `<span class="pi-stat" style="color:${currentProject.color}88">org: ${currentProject.org}</span>` : ''}
    ${pg ? `<span class="pi-stat">进度: <b style="color:#4ade80">${pg.done}✅</b> <b style="color:#facc15">${pg.wip}🔨</b> <b style="color:#ef4444">${pg.blocked}🚫</b> ${pg.todo}⏳ = <b>${pg.pct}%</b></span>
    <div style="flex:0 0 100%;margin-top:4px;"><div class="progress-bar" style="width:100%">
      <div class="pg-done" style="width:${pg.done/pg.total*100}%"></div>
      <div class="pg-wip" style="width:${pg.wip/pg.total*100}%"></div>
      <div class="pg-blocked" style="width:${pg.blocked/pg.total*100}%"></div>
    </div></div>` : ''}
  `;
}
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const corner = document.createElement('div');
  corner.style.cssText = 'font-size:10px;color:#555;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;';
  corner.textContent = '层级 \\ 步骤';
  grid.appendChild(corner);
  steps.forEach(s => {
    const h = document.createElement('div');
    h.className = 'header-cell';
    h.innerHTML = `<span class="step-num">${s.num}</span><span class="step-name">${s.name}</span>`;
    grid.appendChild(h);
  });
  const cellMap = {};
  levels.forEach(l => { steps.forEach((_, si) => { cellMap[`${l.id}-${si}`] = []; }); });
  employees.forEach(emp => {
    const positions = getEmpPositions(emp, currentProject);
    const active = isEmpActive(emp, currentProject);
    const status = active ? getStatus(emp.id, currentProject) : null;
    positions.forEach(([lvl, step]) => {
      const key = `${lvl}-${step}`;
      if (cellMap[key]) cellMap[key].push({ emp, active, status });
    });
  });
  levels.forEach(l => {
    const label = document.createElement('div');
    label.className = `level-label ${l.cls}`;
    label.textContent = l.name;
    grid.appendChild(label);
    steps.forEach((_, si) => {
      const entries = cellMap[`${l.id}-${si}`];
      const cell = document.createElement('div');
      const ae = entries.filter(e => e.active);
      const hasHuman = ae.some(e => e.emp.type === 'human');
      cell.className = `cell ${ae.length ? (hasHuman ? 'human' : 'active') : 'empty'}`;
      // Cell status tint (aggregate)
      if (currentProject.id !== 'all' && ae.length) {
        const sts = ae.map(e => e.status).filter(Boolean);
        if (sts.length) {
          if (sts.every(s => s === 'done')) cell.classList.add('st-done');
          else if (sts.some(s => s === 'blocked')) cell.classList.add('st-blocked');
          else if (sts.some(s => s === 'wip')) cell.classList.add('st-wip');
          else if (sts.some(s => s === 'done')) cell.classList.add('st-mixed');
        }
      }
      entries.forEach(({ emp, active, status }) => {
        const badge = document.createElement('span');
        // 三档虚实：done→12% todo→35% wip/blocked→100%
        let stCls = '';
        if (active && currentProject.id !== 'all' && status) {
          if (status === 'done') stCls = ' st-done-b';
          else if (status === 'todo') stCls = ' st-todo-b';
        }
        badge.className = `badge ${emp.type}${active ? '' : ' inactive'}${stCls}`;
        const label = emp.id.split('-')[0] === 'H' ? '👩' + emp.id : emp.id + ' ' + emp.name;
        const dot = (active && status && status !== 'todo') ? `<span class="sd ${status}"></span>` : '';
        const dtag = active ? deviceTagHtml(emp.id, currentProject) : '';
        badge.innerHTML = label + dot + dtag;
        badge.dataset.empId = emp.id;
        cell.appendChild(badge);
      });
      grid.appendChild(cell);
    });
  });
}

  const row = document.getElementById('subx-row');
  row.innerHTML = '';
  const wf = projectWorkflow[currentProject.id];

  for (let i = 0; i < 12; i++) {

    cell.className = `subx-cell ${isIdle ? 'idle' : 'active'}`;
    cell.style.color = isIdle ? '#333' : (currentProject.color || '#888');
    cell.textContent = name;
    row.appendChild(cell);
  }
  row.style.display = wf ? 'grid' : 'none';
}

  const fRow = document.getElementById('flywheel-row');

  fLabel.style.cssText = 'font-weight:600;color:#666;';

          </tr>
          ${['P01','P02','P03','P04','P05'].map(pid => {

        <div style="margin-top:12px;font-size:10px;color:#666;line-height:1.6;">

          <b style="color:#888;">并行模式：</b>Mac 跑生产时，LG 可同时审阅/测试，Huawei 可同时发布——三台不竞争同一资源
        </div>
      </div>`;

  const da = deviceAlloc[currentProject.id];

      <div class="dl-sub">三台设备并行运行，各有专属职责</div>
      <div class="device-cards">
        ${devices.map(d => {
          const alloc = da[d.id];
          const isNA = !alloc.primary.length;
          return `<div class="device-card" style="border-color:${isNA?'#222':d.color+'44'};${isNA?'opacity:0.4;':''}">

            </div>

            ${alloc.primary.length ? `<div class="dc-emplist">${alloc.primary.map(eid => {
              const emp = employees.find(e => e.id === eid);

              return `<span class="de ${cls}">${eid} ${emp?emp.name:''}</span>`;
            }).join('')}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
}
function renderSidebar() {}

  renderTabs(); renderProjectInfo(); renderGrid(); renderSubX(); renderFlywheel();
  renderAccountSection(); renderDeviceSection(); renderSidebar();
  document.getElementById('model-label').textContent = `平面(X×Y) = 12步演化链 × 6层级 · Z = ${currentProject.name}`;
  document.getElementById('model-label').style.color = currentProject.color;
}
render();

// TOOLTIP
const tooltip = document.getElementById('tooltip');
document.addEventListener('mouseover', e => {
  const badge = e.target.closest('.badge');
  if (!badge || badge.classList.contains('inactive')) { tooltip.classList.remove('show'); return; }
  const emp = employees.find(em => em.id === badge.dataset.empId);
  if (!emp) return;
  const detail = getEmpDetail(emp, currentProject);
  const st = getStatus(emp.id, currentProject);
  const stLabel = {done:'✅ 完成',wip:'🔨 进行中',todo:'⏳ 待开始',blocked:'🚫 阻塞'};
  const stColor = st==='done'?'#4ade80':st==='wip'?'#facc15':st==='blocked'?'#ef4444':'#888';
  const stHtml = st ? `<div style="margin-top:6px;padding-top:6px;border-top:1px solid #333;font-size:11px;color:${stColor}">状态: ${stLabel[st]||st}</div>` : '';
  const pl = `<span class="tt-project" style="background:${currentProject.color}22;color:${currentProject.color}">${currentProject.icon} ${currentProject.name.split('·')[0].trim()}</span>`;
  // Job list: split detail lines into bullet list
  const jobs = detail.split('\n').filter(Boolean);
  const jobHtml = jobs.length > 1
    ? `<ul style="margin:4px 0 0 14px;padding:0;list-style:disc;font-size:11px;color:#bbb;line-height:1.6">${jobs.map(j => `<li>${j}</li>`).join('')}</ul>`
    : `<div class="tt-detail">${detail}</div>`;
  tooltip.innerHTML = `<div class="tt-id">${emp.id} ${pl}</div><div class="tt-name">${emp.name}</div><div class="tt-role">${emp.role}</div>${jobHtml}${stHtml}`;
  const r = badge.getBoundingClientRect();
  tooltip.style.left = Math.min(r.left, window.innerWidth - 380) + 'px';
  tooltip.style.top = (r.bottom + 8) + 'px';
  tooltip.classList.add('show');
});
document.addEventListener('mouseout', e => { if (!e.target.closest('.badge')) tooltip.classList.remove('show'); });
