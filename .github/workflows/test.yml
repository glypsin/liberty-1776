name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: node tests/test_game.js

      - name: Validate HTML
        run: |
          # Check for common HTML issues
          if grep -q '<script>' liberty_v5.html && grep -q '</script>' liberty_v5.html; then
            echo "HTML structure: OK"
          else
            echo "HTML structure: MISSING script tags"
            exit 1
          fi
          # Check all screens have IDs
          for screen in menuScreen gameScreen gameOverScreen campaignScreen deckBuilderScreen draftScreen; do
            if grep -q "id=\"$screen\"" liberty_v5.html; then
              echo "Screen $screen: OK"
            else
              echo "Screen $screen: MISSING"
              exit 1
            fi
          done
